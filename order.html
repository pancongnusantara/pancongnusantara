<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="foto/logogram png.png">
<title>Order Pancong Nusantara</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  background:#0f0f0f;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:550px;
  background:#1a1a1a;
  padding:30px;
  border-radius:30px;
}

.title{
  text-align:center;
  margin-bottom:25px;
}

.title h1{
  font-size:28px;
}

.form-group{
  margin-bottom:15px;
}

label{
  font-size:14px;
  display:block;
  margin-bottom:5px;
}

input, select{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#2a2a2a;
  color:white;
}

.order-item{
  background:#222;
  padding:15px;
  border-radius:15px;
  margin-top:15px;
}

.topping label{
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  margin-bottom: 5px;
}

.topping input[type="checkbox"]{
  width: 16px;
  height: 16px;
  cursor: pointer;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:15px;
  margin-top:15px;
  cursor:pointer;
}

.add-btn{background:#333;}
.submit-btn{background:linear-gradient(45deg,#ff9800,#ff4d6d);}
.delete-btn{background:red;margin-top:10px;}

.price-box{
  margin-top:20px;
  padding:15px;
  background:#252525;
  border-radius:15px;
}

.total{
  font-size:22px;
  font-weight:bold;
  color:#ff9d00;
}
</style>
</head>

<body>

<div class="container">

<div class="title">
  <h1>Order Pancong ✨</h1>
</div>

<form id="orderForm">

<div class="form-group">
  <label>Nama</label>
  <input type="text" id="nama" required>
</div>

<div class="form-group">
  <label>Nomor WhatsApp</label>
  <input type="text" id="nomor" required>
</div>

<div id="orderItems"></div>

<button type="button" class="add-btn" onclick="tambahItem()">+ Tambah Pesanan</button>

<div class="price-box">
  <div>Total Harga</div>
  <div class="total" id="totalHarga">Rp0</div>
</div>

<button type="submit" class="submit-btn">Pesan Sekarang 🚀</button>

</form>

</div>

<script>

// =====================
// DATA HARGA RASA
// =====================
const hargaMenu = {
  original: {S:8000, M:14000, L:16000},
  taro: {S:10000, M:17000, L:20000},
  cappucino: {S:10000, M:17000, L:20000},
  greentea: {S:10000, M:17000, L:20000},
  redvelvet: {S:10000, M:17000, L:20000},
  darkchoco: {S:11000, M:18000, L:22000},
  tiramisu: {S:11000, M:18000, L:22000},
  chococrunchy: {S:11000, M:18000, L:22000}
};

// =====================
// DATA HARGA TOPPING
// =====================
const hargaTopping = {
  meses: {S:2000, M:3000, L:4000},
  milo: {S:2000, M:3000, L:4000},
  chocochip: {S:2000, M:3000, L:4000},
  oreo: {S:2000, M:4000, L:4000},
  keju: {S:3000, M:4000, L:6000},
  almond: {S:3000, M:4000, L:6000},
  regal: {S:3000, M:4000, L:6000}
};

// =====================
// TAMBAH ITEM
// =====================
function tambahItem(){

  const container = document.getElementById("orderItems");

  const item = document.createElement("div");
  item.classList.add("order-item");

  item.innerHTML = `
    <label>Rasa</label>
    <select class="rasa">
      <option value="original">Original</option>
      <option value="taro">Taro</option>
      <option value="cappucino">Cappucino</option>
      <option value="greentea">Green Tea</option>
      <option value="redvelvet">Red Velvet</option>
      <option value="darkchoco">Dark Choco</option>
      <option value="tiramisu">Tiramisu Crunchy</option>
      <option value="chococrunchy">Choco Crunchy</option>
    </select>

    <label>Size</label>
    <select class="size">
      <option value="S">S</option>
      <option value="M">M</option>
      <option value="L">L</option>
    </select>

    <label>Kematangan</label>
    <select class="kematangan">
      <option value="Matang">Matang</option>
      <option value="Lumer">Lumer</option>
    </select>

    <label>Jumlah</label>
    <input type="number" class="jumlah" value="1" min="1">

    <label>Topping</label>
    <div class="topping">
      <label><input type="checkbox" value="meses"> Meses</label>
      <label><input type="checkbox" value="milo"> Milo</label>
      <label><input type="checkbox" value="chocochip"> Choco Chip</label>
      <label><input type="checkbox" value="oreo"> Oreo</label>
      <label><input type="checkbox" value="keju"> Keju</label>
      <label><input type="checkbox" value="almond"> Almond</label>
      <label><input type="checkbox" value="regal"> Regal</label>
    </div>

    <button type="button" class="delete-btn" onclick="hapusItem(this)">Hapus</button>
  `;

  container.appendChild(item);

  attachEvents(item);
  updateHarga();
}

// =====================
// HAPUS ITEM
// =====================
function hapusItem(btn){
  btn.parentElement.remove();
  updateHarga();
}

// =====================
// EVENT
// =====================
function attachEvents(item){
  item.querySelectorAll("select, input").forEach(el=>{
    el.addEventListener("change", updateHarga);
    el.addEventListener("input", updateHarga);
  });
}

// =====================
// HITUNG TOTAL
// =====================
function updateHarga(){

  let totalSemua = 0;

  document.querySelectorAll(".order-item").forEach(item => {

    const rasa = item.querySelector(".rasa").value;
    const size = item.querySelector(".size").value;
    const jumlah = parseInt(item.querySelector(".jumlah").value);

    let harga = hargaMenu[rasa][size];

    let toppingTotal = 0;

    item.querySelectorAll('input[type="checkbox"]:checked')
    .forEach(t => {
      toppingTotal += hargaTopping[t.value][size];
    });

    totalSemua += (harga + toppingTotal) * jumlah;

  });

  document.getElementById("totalHarga").innerText =
    "Rp" + totalSemua.toLocaleString("id-ID");
}

const scriptURL = "https://script.google.com/macros/s/AKfycbywX_UBXXwSK71bBujUGsR3SSeLT9njk-QkgbZiZfgzXDFruaOtlSvBA_fAdp6Y0iTXoQ/exec";

document.getElementById("orderForm")
.addEventListener("submit", function(e){

  e.preventDefault();

  const nama = document.getElementById("nama").value;
  let nomor = document.getElementById("nomor").value.replace(/^0/, "62");

  let items = [];

  document.querySelectorAll(".order-item").forEach(item => {

    const rasa = item.querySelector(".rasa").value;
    const size = item.querySelector(".size").value;
    const kematangan = item.querySelector(".kematangan").value;
    const jumlah = item.querySelector(".jumlah").value;

    let topping = [];
    item.querySelectorAll('input[type="checkbox"]:checked')
      .forEach(t => topping.push(t.value));

    items.push({
      rasa,
      size,
      kematangan,
      jumlah,
      topping
    });

  });

  const total = document.getElementById("totalHarga").innerText;

  const data = {
    nama,
    nomor,
    items,
    total
  };

  // =====================
  // KIRIM KE SPREADSHEET
  // =====================
  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(response => {
    alert("Pesanan berhasil dikirim ke database!");
  })
  .catch(error => {
    alert("Gagal kirim ke spreadsheet");
  });

  // =====================
  // TETAP KIRIM KE WA
  // =====================
  let detailPesanan = "";

  items.forEach((item, i) => {
    detailPesanan += `
Item ${i+1}:
- ${item.rasa}
- Size: ${item.size}
- Kematangan: ${item.kematangan}
- Qty: ${item.jumlah}
- Topping: ${item.topping.join(", ") || "-"}
`;
  });

  const pesan = `Halo Pancong Nusantara ✨

Nama: ${nama}
Nomor: ${nomor}

Pesanan:
${detailPesanan}

Total:
${total}`;

  window.open(
    `https://wa.me/6288991473289?text=${encodeURIComponent(pesan)}`,
    "_blank"
  );

});

// AUTO LOAD
tambahItem();

</script>

</body>
</html>
