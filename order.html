<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Pancong Nusantara</title>
  <link rel="icon" type="image/x-icon" href="foto/logogram png.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins',sans-serif;
      background:#0f0f0f;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:500px;
      background:#1a1a1a;
      padding:30px;
      border-radius:30px;
      box-shadow:0 10px 40px rgba(0,0,0,0.4);
    }

    .title{
      text-align:center;
      margin-bottom:30px;
    }

    .title h1{
      font-size:32px;
      margin-bottom:8px;
    }

    .title p{
      color:#bdbdbd;
      font-size:14px;
    }

    .form-group{
      margin-bottom:20px;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-size:14px;
      font-weight:500;
    }

    input,
    select,
    textarea{
      width:100%;
      padding:14px;
      border:none;
      border-radius:15px;
      background:#2a2a2a;
      color:white;
      font-size:14px;
      outline:none;
    }

    textarea{
      resize:none;
      height:100px;
    }

    .price-box{
      margin-top:25px;
      background:#252525;
      padding:20px;
      border-radius:20px;
    }

    .price-box h3{
      margin-bottom:10px;
      font-size:18px;
    }

    .total{
      font-size:28px;
      font-weight:700;
      color:#ff9d00;
    }

    button{
      width:100%;
      margin-top:25px;
      padding:16px;
      border:none;
      border-radius:18px;
      background:linear-gradient(45deg,#ff9800,#ff4d6d);
      color:white;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      transform:scale(1.02);
    }

    .note{
      margin-top:20px;
      text-align:center;
      font-size:12px;
      color:#999;
    }

    @media(max-width:480px){

      .container{
        padding:22px;
      }

      .title h1{
        font-size:26px;
      }

      .total{
        font-size:24px;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <div class="title">
      <h1>Order Pancong ✨</h1>
      <p>Hangat, lumer, bikin nagih 🤍</p>
    </div>

    <form id="orderForm">

      <div class="form-group">
        <label>Nama</label>
        <input type="text" id="nama" required>
      </div>

      <div class="form-group">
        <label>Nomor WhatsApp</label>
        <input type="text" id="nomor" required>
      </div>

      <div class="form-group">
        <label>Pilih Menu</label>
        <select id="menu">

            <optgroup label="🔥 Best Seller">
                <option value="12000">Choco Crunchy - Rp12.000</option>
                <option value="12000">Tiramisu Crunchy - Rp12.000</option>
            </optgroup>

            <optgroup label="🍵 Signature">
                <option value="10000">Matcha - Rp10.000</option>
                <option value="11000">Red Velvet - Rp11.000</option>
                <option value="11000">Vanilla Milk - Rp11.000</option>
            </optgroup>

            <optgroup label="🧀 Premium Topping">
                <option value="13000">Coklat Keju Lumer - Rp13.000</option>
                <option value="13000">Oreo Keju - Rp13.000</option>
                <option value="14000">Lotus Biscoff - Rp14.000</option>
            </optgroup>

        </select>
      </div>

      <div class="form-group">
        <label>Jumlah</label>
        <input type="number" id="jumlah" value="1" min="1">
      </div>

      <div class="form-group">
        <label>Level Kematangan</label>
        <select id="kematangan">
          <option>Setengah Matang</option>
          <option>Medium</option>
          <option>Matang</option>
          <option>Extra Crispy</option>
        </select>
      </div>

      <div class="form-group">
        <label>Custom Rasa / Topping</label>
        <input type="text" id="custom" placeholder="Contoh: extra oreo, keju, dll">
      </div>

      <div class="form-group">
        <label>Catatan Tambahan</label>
        <textarea id="catatan"></textarea>
      </div>

      <div class="price-box">
        <h3>Total Harga</h3>
        <div class="total" id="totalHarga">Rp11.000</div>
      </div>

      <button type="submit">
        Pesan Sekarang 🚀
      </button>

    </form>

    <div class="note">
      Setelah klik tombol, pesanan otomatis masuk WhatsApp ✨
    </div>

  </div>

<script>
const menu = document.getElementById("menu");
const jumlah = document.getElementById("jumlah");
const totalHarga = document.getElementById("totalHarga");

function updateHarga(){
  const harga = parseInt(menu.value);
  const qty = parseInt(jumlah.value);
  const total = harga * qty;

  totalHarga.innerText = "Rp" + total.toLocaleString("id-ID");
}

menu.addEventListener("change", updateHarga);
jumlah.addEventListener("input", updateHarga);

updateHarga();


// =========================
// SUBMIT FORM
// =========================

document.getElementById("orderForm")
.addEventListener("submit", async function(e){

  e.preventDefault();

  const nama = document.getElementById("nama").value;
  let nomor = document.getElementById("nomor").value;

  // 🔥 otomatis ubah ke format 62
  nomor = nomor.replace(/^0/, "62");

  const selectedMenu = menu.options[menu.selectedIndex].text;
  const qty = jumlah.value;
  const kematangan = document.getElementById("kematangan").value;
  const custom = document.getElementById("custom").value;
  const catatan = document.getElementById("catatan").value;
  const total = totalHarga.innerText;

  // =========================
  // FORMAT PESAN WA
  // =========================

  const pesan = `Halo Pancong Nusantara ✨

Saya ingin pesan:

Nama: ${nama}
Nomor: ${nomor}

Menu: ${selectedMenu}
Jumlah: ${qty}

Level Kematangan:
${kematangan}

Custom:
${custom}

Catatan:
${catatan}

Total:
${total}`;

  // =========================
  // KIRIM KE SPREADSHEET
  // =========================

  try {

    const response = await fetch(
      "https://script.google.com/macros/s/AKfycbywX_UBXXwSK71bBujUGsR3SSeLT9njk-QkgbZiZfgzXDFruaOtlSvBA_fAdp6Y0iTXoQ/exec",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          nama: nama,
          nomor: nomor,
          menu: selectedMenu,
          jumlah: qty,
          kematangan: kematangan,
          custom: custom,
          catatan: catatan,
          total: total
        })
      }
    );

    const result = await response.text();
    console.log("Spreadsheet:", result);

  } catch (error) {
    console.log("ERROR Spreadsheet:", error);
  }

  // =========================
  // BUKA WHATSAPP
  // =========================

  window.open(
    `https://wa.me/6288991473289?text=${encodeURIComponent(pesan)}`,
    "_blank"
  );

});
</script>
</body>
</html>
